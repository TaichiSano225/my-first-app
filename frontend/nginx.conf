server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    # 自己署名証明書（Dockerfile で生成）
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # http:// で同じポート(3000)にアクセスされた場合は https へ誘導する
    # （497 = "HTTP request sent to HTTPS port"）
    error_page 497 =301 https://$host:3000$request_uri;

    # React のビルド成果物を配信する
    root /usr/share/nginx/html;
    index index.html;

    # /api/ で始まる呼び出しはバックエンドコンテナへ中継する。
    # 末尾スラッシュなし = /api を保持したまま転送する。
    # 例: /api/stock/AAPL → http://backend:8000/api/stock/AAPL
    location /api/ {
        proxy_pass http://backend:8000;
    }

    # SPA 対応: 上記以外はすべて index.html を返す
    # （ページをリロードしても 404 にならないようにする）
    location / {
        try_files $uri $uri/ /index.html;
    }
}
