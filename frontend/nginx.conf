server {
    listen 80;
    server_name _;

    # React のビルド成果物を配信する
    root /usr/share/nginx/html;
    index index.html;

    # /api/ で始まる呼び出しはバックエンドコンテナへ中継する。
    # 末尾スラッシュにより /api は取り除かれる。
    # 例: /api/stock/AAPL → http://backend:8000/stock/AAPL
    location /api/ {
        proxy_pass http://backend:8000/;
    }

    # SPA 対応: 上記以外はすべて index.html を返す
    # （ページをリロードしても 404 にならないようにする）
    location / {
        try_files $uri $uri/ /index.html;
    }
}
