services:
  # バックエンド: FastAPI (株価取得 API)
  backend:
    build: .
    image: stock-checker-backend
    ports:
      - "8000:8000"   # 直接 API を叩きたいとき用（無くても frontend 経由で動く）
    restart: unless-stopped

  # フロントエンド: React を nginx で HTTPS 配信し、/api をバックエンドへ中継
  frontend:
    build: ./frontend
    image: stock-checker-frontend
    ports:
      - "3000:443"    # https://localhost:3000 でアクセス（自己署名証明書）
    depends_on:
      - backend
    restart: unless-stopped
